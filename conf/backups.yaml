# yaml-language-server: $schema=../schemas/backups.json
---
backups:

  # Files with these extensions will not be checksummed
  # if the dst file exists, instead a comparison is made of
  # the sizes between src and dst. This is done so that ext's
  # associated with typically large binary files ( like media
  # files ) need not perform CPU-intensive compare tasks. A
  # simple compare of the size attribute is much more
  # economical in this case.

  # Leave value as empty list to checksum all files ( most
  # performance impacting, most accurate ).

  non_checksum_exts:
    - avi
    - m4v
    - mkv
    - mp3
    - mp4
    - mpg
    - wav
    - webm

  objects:
    - name: raid-1
      targets:
        - black
        - blue
        - green
        - white
        - red/tv-*
        - red/movies-*
        - red/movies/1*
        - red/movies/2*
        - red/movies/3*
        - red/movies/4*
        - red/movies/5*
        - red/movies/A*
        - red/movies/B*
        - red/movies/C*
        - red/movies/D*
        - red/movies/E*
        - red/movies/F*
        - red/movies/G*
        - red/movies/H*
        - red/movies/I*
        - red/movies/J*

    - name: raid-2
      targets:
        - red/movies/K*
        - red/movies/L*
        - red/movies/M*
        - red/movies/N*
        - red/movies/O*
        - red/movies/P*
        - red/movies/Q*
        - red/movies/R*
        - red/movies/S*
        - red/movies/T*
        - red/movies/U*
        - red/movies/V*
        - red/movies/W*
        - red/movies/X*
        - red/movies/Y*
        - red/movies/Z*
        - red/tv/1*
        - red/tv/2*
        - red/tv/3*
        - red/tv/9*
        - red/tv/A*
        - red/tv/B*

    - name: raid-3
      targets:
        - red/tv/C*
        - red/tv/D*
        - red/tv/E*
        - red/tv/F*
        - red/tv/G*
        - red/tv/H*
        - red/tv/I*
        - red/tv/J*
        - red/tv/K*
        - red/tv/L*
        - red/tv/M*
        - red/tv/N*
        - red/tv/O*
        - red/tv/P*
        - red/tv/Q*
        - red/tv/R*

    - name: raid-4
      targets:
        - red/tv/S*
        - red/tv/T*
        - red/tv/V*
        - red/tv/W*
        - red/tv/X*
        - red/tv/Y*

    - name: app
      targets:
        - deluge
        - elasticsearch
        - filebrowser
        - gitlab
        - keycloak
        - nexus
        - nginx
        - openvpnas
        - pihole
        - plex
        - redis
        - runner
        - tautulli
        - vault
        - zoneminder

  # project logging values for the 'MAIN_LOG'
  # object.

  logging:
    format:
      banner: "%(asctime)s [ %(levelname)s ] %(name)s - %(message)s"
      date: "%Y-%m-%d"
      time: "%H:%M:%S"
