---
services:

  ############################################################
  # backup_raidvol
  ############################################################

  backup_raidvol:
    image: docker-hosted.proxy-int.pendragonlab.com/elise/grail:main
    entrypoint: python src
    profiles:
      - backup-raidvol

    environment:
      - TZ=America/Denver
      - BACKUP_OBJECT=${BACKUP_OBJECT}

    volumes:
      - type: volume
        source: raid_vol
        target: /src-backup-path
        read_only: false

      - type: bind
        source: /mnt/usb-backup/raidvol
        target: /dst-backup-path
        read_only: false

    networks:
      - grail

    logging:
      options:
        max-size: 10m
        max-file: '10'

  ############################################################
  # restore_raidvol
  ############################################################

  restore_raidvol:
    image: docker-hosted.proxy-int.pendragonlab.com/elise/grail:main
    entrypoint: python src
    profiles:
      - restore-raidvol

    environment:
      - TZ=America/Denver
      - BACKUP_OBJECT=${BACKUP_OBJECT}

    volumes:
      - type: bind
        source: /mnt/usb-backup/raidvol
        target: /src-backup-path
        read_only: false

      - type: volume
        source: raid_vol
        target: /dst-backup-path
        read_only: false

    networks:
      - grail

    logging:
      options:
        max-size: 10m
        max-file: '10'

  ############################################################
  # backup_labvol
  ############################################################

  backup_labvol:
    image: docker-hosted.proxy-int.pendragonlab.com/elise/grail:main
    entrypoint: python src
    profiles:
      - backup-labvol

    environment:
      - TZ=America/Denver
      - BACKUP_OBJECT=labvol

    volumes:
      - type: bind
        source: /mnt/dfs_lvm/lab_dfs
        target: /src-backup-path
        read_only: false

      - type: bind
        source: /mnt/usb-backup/labvol
        target: /dst-backup-path
        read_only: false

    networks:
      - grail

    logging:
      options:
        max-size: 10m
        max-file: '10'

  ############################################################
  # restore_labvol
  ############################################################

  restore_labvol:
    image: docker-hosted.proxy-int.pendragonlab.com/elise/grail:main
    entrypoint: python src
    profiles:
      - restore-labvol

    environment:
      - TZ=America/Denver
      - BACKUP_OBJECT=labvol

    volumes:
      - type: bind
        source: /mnt/usb-backup/labvol
        target: /src-backup-path
        read_only: false

      - type: bind
        source: /mnt/dfs_lvm/lab_dfs
        target: /dst-backup-path
        read_only: false

    networks:
      - grail

    logging:
      options:
        max-size: 10m
        max-file: '10'

###########################################################
# resources
###########################################################

volumes:
  raid_vol:
    driver_opts:
      type: cifs
      o: "\
        username=${RAID_VOL_USERNAME},\
        password=${RAID_VOL_PASSWORD},\
        uid=${LOCAL_USER_UID},\
        gid=${LOCAL_USER_GID},\
        iocharset=utf8"
      device: //${RAID_VOL_HOST}/${RAID_VOL_SHARE}

networks:
  grail:
    name: grail
